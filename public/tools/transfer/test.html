<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码检测</title>
    <script async src="/tools/transfer/js/opencv.js" onload="onOpenCvReady()" type="text/javascript"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            background: #1e1e1e;
            margin-top: 20px;
        }
        header {
            padding: 15px 0;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 500;
        }
        .content {
            padding: 0px;
        }
        .video-container {
            width: 100%;
            margin-bottom: 20px;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        #video {
            width: 100%;
            display: block;
            background: #000;
        }
        .result-container {
            width: 100%;
            text-align: center;
            padding: 15px;
            background: #1a1a1a;
            margin-top: 15px;
        }
        .result-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #aaa;
        }
        #qrcode-img {
            max-width: 100%;
            max-height: 200px;
            display: none;
            margin: 0 auto;
        }
        #qrcode-img.visible {
            display: block;
        }
        .status {
            margin-top: 10px;
            font-size: 0.95rem;
            min-height: 20px;
            color: #aaa;
            line-height: 1.4;
        }
        .status.detected {
            color: #4dff91;
        }
        .status.detected-nonstandard {
            color: #ffd700;
        }
        .status.error {
            color: #ff6b6b;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-size: 1.1rem;
            color: #aaa;
        }
        .loading.hidden {
            display: none;
        }
        @media (max-width: 768px) {
            .content { padding: 0px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">正在加载OpenCV.js...</div>
    
    <div class="container">
        <div class="content">
            <div class="video-container">
                <video id="video" autoplay playsinline></video>
            </div>
            
            <div class="result-container">
                <div class="result-title">检测结果</div>
                <img id="qrcode-img" alt="二维码">
                <div class="status" id="status">等待检测二维码...</div>
            </div>
        </div>
    </div>

    <script>
        let stream = null;
        let video = null;
        let canvas = null;
        let ctx = null;
        let qrcodeDetector = null;
        let lastDetectionTime = 0;
        const DETECTION_COOLDOWN = 300;
        
        // 等待OpenCV完全初始化
        function waitForOpenCV() {
            return new Promise((resolve) => {
                if (typeof cv !== 'undefined' && cv.QRCodeDetector) {
                    resolve(true);
                    return;
                }
                
                const checkInterval = setInterval(() => {
                    if (typeof cv !== 'undefined' && cv.QRCodeDetector) {
                        clearInterval(checkInterval);
                        resolve(true);
                    }
                }, 50);
                
                setTimeout(() => {
                    clearInterval(checkInterval);
                    resolve(false);
                }, 10000);
            });
        }
        
        async function onOpenCvReady() {
            try {
                const opencvReady = await waitForOpenCV();
                if (!opencvReady || typeof cv === 'undefined') {
                    throw new Error('OpenCV.js 加载超时');
                }
                
                console.log("OpenCV.js 已加载");
                document.getElementById('loading').classList.add('hidden');
                initApplication();
            } catch (error) {
                console.error("OpenCV加载错误:", error);
                document.getElementById('loading').textContent = `加载失败: ${error.message}. 请刷新页面重试`;
            }
        }
        
        function initApplication() {
            video = document.getElementById('video');
            canvas = document.createElement('canvas');
            ctx = canvas.getContext('2d');
            const statusEl = document.getElementById('status');
            
            // 请求摄像头权限
            if (!navigator.mediaDevices?.getUserMedia) {
                statusEl.textContent = "浏览器不支持摄像头访问";
                statusEl.className = "status error";
                return;
            }
            
            navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { ideal: "environment" } } 
            })
            .then(videoStream => {
                stream = videoStream;
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth || 640;
                    canvas.height = video.videoHeight || 480;
                    
                    try {
                        qrcodeDetector = new cv.QRCodeDetector();
                        console.log("QRCodeDetector 初始化成功");
                        statusEl.textContent = "摄像头就绪，将二维码置于取景框内";
                        statusEl.className = "status";
                        processVideoFrame();
                    } catch (err) {
                        console.error("初始化失败:", err);
                        statusEl.textContent = `初始化失败: ${err.message}`;
                        statusEl.className = "status error";
                    }
                };
            })
            .catch(err => {
                let msg = "无法访问摄像头: ";
                if (err.name === 'NotAllowedError') msg += "请允许摄像头权限";
                else if (err.name === 'NotFoundError') msg += "未检测到摄像头";
                else msg += err.message || err.name;
                
                statusEl.textContent = msg;
                statusEl.className = "status error";
            });
        }
        
        function processVideoFrame() {
            if (!video || !qrcodeDetector || video.paused || video.ended || !video.readyState) {
                requestAnimationFrame(processVideoFrame);
                return;
            }
            
            const now = Date.now();
            if (now - lastDetectionTime < DETECTION_COOLDOWN) {
                requestAnimationFrame(processVideoFrame);
                return;
            }
            
            try {
                // 绘制当前视频帧
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // 读取图像
                const src = cv.imread(canvas);
                if (src.empty()) {
                    src.delete();
                    requestAnimationFrame(processVideoFrame);
                    return;
                }
                
                const gray = new cv.Mat();
                const pointsMat = new cv.Mat();
                
                try {
                    // 转灰度
                    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
                    
                    // 使用detect方法检测二维码位置，不进行解码
                    const detectionResult = qrcodeDetector.detect(gray, pointsMat);
                    
                    const statusEl = document.getElementById('status');
                    const qrcodeImg = document.getElementById('qrcode-img');
                    
                    // 检查是否检测到定位点
                    const hasPoints = pointsMat.rows > 0 && pointsMat.cols > 0;
                    
                    if (hasPoints) {
                        lastDetectionTime = now;
                        
                        // 使用decode获取矫正后的二维码图像
                        const straightQrCode = new cv.Mat();
                        try {
                            // decode方法用于获取矫正图像，但不返回解码文本
                            const decodedText = qrcodeDetector.decode(gray, pointsMat, straightQrCode);
                            
                            if (straightQrCode.rows > 0 && straightQrCode.cols > 0) {
                                // 提取矫正图像
                                const tempCanvas = document.createElement('canvas');
                                const tempCtx = tempCanvas.getContext('2d');
                                tempCanvas.width = straightQrCode.cols;
                                tempCanvas.height = straightQrCode.rows;
                                
                                const imageData = tempCtx.createImageData(
                                    straightQrCode.cols, 
                                    straightQrCode.rows
                                );
                                
                                // 处理灰度图像数据
                                const data = straightQrCode.data;
                                const size = straightQrCode.cols * straightQrCode.rows;
                                
                                for (let i = 0; i < size; i++) {
                                    const val = data[i];
                                    const idx = i * 4;
                                    imageData.data[idx] = val;     // R
                                    imageData.data[idx + 1] = val; // G
                                    imageData.data[idx + 2] = val; // B
                                    imageData.data[idx + 3] = 255; // A
                                }
                                
                                tempCtx.putImageData(imageData, 0, 0);
                                qrcodeImg.src = tempCanvas.toDataURL('image/png');
                                qrcodeImg.classList.add('visible');
                                
                                // 根据是否能解码显示不同状态
                                if (decodedText && decodedText.trim().length > 0) {
                                    // 标准二维码，可以解码
                                    statusEl.innerHTML = `标准二维码检测到，可解码: ${decodedText.substring(0, 30)}${decodedText.length > 30 ? '...' : ''}`;
                                    statusEl.className = "status detected";
                                } else {
                                    // 定位图案完整但数据无法解码
                                    statusEl.textContent = "检测到非标准二维码（定位图案完整，但数据无法解码）";
                                    statusEl.className = "status detected-nonstandard";
                                }
                            } else {
                                // 只检测到定位点，但无法获得矫正图像
                                statusEl.textContent = "检测到二维码定位图案";
                                statusEl.className = "status detected";
                            }
                        } finally {
                            straightQrCode.delete();
                        }
                    } else if (qrcodeImg.classList.contains('visible')) {
                        // 未检测到，隐藏之前的结果
                        qrcodeImg.classList.remove('visible');
                        statusEl.textContent = "等待检测二维码...";
                        statusEl.className = "status";
                    }
                } catch (err) {
                    console.warn("处理帧时警告:", err.message);
                } finally {
                    gray.delete();
                    pointsMat.delete();
                }
                
                src.delete();
            } catch (err) {
                console.error("严重错误:", err);
            }
            
            requestAnimationFrame(processVideoFrame);
        }
        
        // 清理资源
        window.addEventListener('beforeunload', () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (qrcodeDetector) {
                try { qrcodeDetector.delete(); } catch (e) {}
            }
        });
        
        // 加载超时处理
        setTimeout(() => {
            const loading = document.getElementById('loading');
            if (typeof cv === 'undefined' && !loading.classList.contains('hidden')) {
                loading.textContent = "OpenCV.js 加载超时，请刷新页面重试";
            }
        }, 15000);
    </script>
</body>
</html>
